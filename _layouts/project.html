---
title: {{page.title}}
layout: default
---
<section id="page_content">
    <div class="image main" data-position="center">
        <img src="{{ page.thumbnail | relative_url }}" alt="" />
    </div>

        <div class="container">
            <header class="major">
                <h2>{{page.title}}</h2>
                <p>{{page.subtitle}}</p>
            </header>
            {{content}}
        </div>
</section>
